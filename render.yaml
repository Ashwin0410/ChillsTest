services:
  - type: web
    name: rewire-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: FFMPEG_BIN
        value: /usr/bin/ffmpeg
      - key: FFPROBE_BIN
        value: /usr/bin/ffprobe
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: OUT_DIR
        value: /tmp/rewire-demo-output
      - key: PUBLIC_BASE_URL
        sync: false
